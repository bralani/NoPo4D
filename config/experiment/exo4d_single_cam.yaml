# @package _global_

defaults:
- /dataset@_group_.exo4d: exo4d
- override /loss: [mse, lpips, ssim, depth_consis, optical_flow, opacity, distill]

wandb:
  name: exo4d-single-cam
  tags: [exo4d, 448x448]

dataset:
  exo4d:
    view_sampler:
      min_cameras: 1
      max_cameras: 1
      min_context_views: 2
      max_context_views: 12
      min_target_views: 2
      max_target_views: 12
      max_img_per_gpu: 12

checkpointing:
  load: null
  load_only_weights: false
